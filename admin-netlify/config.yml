backend:
  name: git-gateway
  branch: main

local_backend: true
media_folder: "assets/uploads"
public_folder: "assets/uploads"
site_url: "https://zuozhijun1502.github.io/zuo-group/"
display_url: "https://zuozhijun1502.github.io/zuo-group/"
logo_url: "https://zuozhijun1502.github.io/zuo-group/assets/hero-lab.png"

collections:
  - name: "website_content"
    label: "Website Content"
    files:
      - name: "site"
        label: "Site Settings"
        file: "content/site.json"
        format: "json"
        fields:
          - label: "Brand in the top-left header"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Group name", name: "groupName", widget: "string" }
              - { label: "Small subtitle under group name", name: "subtitle", widget: "string" }
              - { label: "Home link", name: "homeUrl", widget: "string", default: "index.html" }
              - { label: "Logo image", name: "logoImage", widget: "image", required: false }
          - label: "Theme colors"
            name: "theme"
            widget: "object"
            fields:
              - { label: "Main red color", name: "primaryColor", widget: "string", default: "#9e2f32" }
              - { label: "Darker red color", name: "primaryDarkColor", widget: "string", default: "#762325" }
          - label: "Top navigation menu"
            name: "navigation"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Show this menu item", name: "visible", widget: "boolean", required: false, default: true }
              - { label: "Page key", name: "pageKey", widget: "string" }
              - { label: "Menu text", name: "label", widget: "string" }
              - { label: "Menu link", name: "url", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Footer group name", name: "groupName", widget: "string" }
              - { label: "Footer affiliation line", name: "affiliation", widget: "string" }
              - label: "Footer links"
                name: "links"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { label: "Show this link", name: "visible", widget: "boolean", required: false, default: true }
                  - { label: "Link text", name: "label", widget: "string" }
                  - { label: "Link URL", name: "url", widget: "string" }

      - name: "home"
        label: "Home"
        file: "content/home.json"
        format: "json"
        fields:
          - label: "Google / browser title information"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Browser title", name: "title", widget: "string" }
              - { label: "Google description", name: "description", widget: "text" }
              - { label: "Search keywords", name: "keywords", widget: "text" }
          - label: "Homepage hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Show this section", name: "show", widget: "boolean", required: false, default: true }
              - { label: "Background image", name: "backgroundImage", widget: "image", required: false }
              - label: "Hero image display mode"
                name: "backgroundSize"
                widget: "select"
                required: false
                default: "cover"
                options:
                  - { label: "Fill the hero area", value: "cover" }
                  - { label: "Show full image", value: "contain" }
              - label: "Hero image position"
                name: "backgroundPosition"
                widget: "select"
                required: false
                default: "center"
                options:
                  - { label: "Center", value: "center" }
                  - { label: "Top", value: "top" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Left", value: "left" }
                  - { label: "Right", value: "right" }
              - label: "Hero height"
                name: "heroHeight"
                widget: "select"
                required: false
                default: "standard"
                options:
                  - { label: "Compact", value: "compact" }
                  - { label: "Standard", value: "standard" }
                  - { label: "Tall", value: "tall" }
              - { label: "Small label", name: "eyebrow", widget: "string" }
              - { label: "Large title", name: "title", widget: "string" }
              - { label: "Statement line", name: "statement", widget: "text" }
              - { label: "Description line", name: "copy", widget: "text" }
              - label: "Text alignment"
                name: "textAlignment"
                widget: "select"
                default: "left"
                options: ["left", "center"]
              - label: "Hero buttons"
                name: "buttons"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { label: "Show this button", name: "visible", widget: "boolean", required: false, default: true }
                  - { label: "Button text", name: "label", widget: "string" }
                  - { label: "Button link", name: "url", widget: "string" }
                  - { label: "Icon name, optional", name: "icon", widget: "string", required: false }
                  - label: "Button style"
                    name: "style"
                    widget: "select"
                    default: "primary"
                    options: ["primary", "ghost"]
          - label: "Optional metric strip"
            name: "metrics"
            widget: "object"
            fields:
              - { label: "Show metric strip", name: "show", widget: "boolean", required: false, default: false }
              - label: "Metrics"
                name: "items"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { label: "Show this metric", name: "visible", widget: "boolean", required: false, default: true }
                  - { label: "Small label", name: "label", widget: "string" }
                  - { label: "Large value", name: "value", widget: "string" }
          - label: "Research focus section"
            name: "focus"
            widget: "object"
            fields:
              - { label: "Show this section", name: "show", widget: "boolean", required: false, default: true }
              - { label: "Small red label", name: "eyebrow", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - label: "Image display mode"
                name: "imageFit"
                widget: "select"
                required: false
                default: "cover"
                options:
                  - { label: "Fill area, crop edges if needed", value: "cover" }
                  - { label: "Show full image, no cropping", value: "contain" }
              - label: "Image position"
                name: "imagePosition"
                widget: "select"
                required: false
                default: "center"
                options:
                  - { label: "Center", value: "center" }
                  - { label: "Top", value: "top" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Left", value: "left" }
                  - { label: "Right", value: "right" }
              - label: "Image size / height"
                name: "imageHeight"
                widget: "select"
                required: false
                default: "standard"
                options:
                  - { label: "Short", value: "short" }
                  - { label: "Standard", value: "standard" }
                  - { label: "Tall", value: "tall" }
              - { label: "Image description", name: "imageAlt", widget: "string", required: false }
              - { label: "Main text", name: "text", widget: "text" }
              - { label: "Link text", name: "linkLabel", widget: "string", required: false }
              - { label: "Link URL", name: "linkUrl", widget: "string", required: false }
          - label: "Homepage guide cards"
            name: "guide"
            widget: "object"
            fields:
              - { label: "Show this section", name: "show", widget: "boolean", required: false, default: true }
              - { label: "Small red label", name: "eyebrow", widget: "string" }
              - { label: "Section title", name: "title", widget: "string" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                summary: "{{fields.number}} {{fields.title}}"
                fields:
                  - { label: "Show this card", name: "visible", widget: "boolean", required: false, default: true }
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
                  - { label: "Link URL", name: "url", widget: "string" }
          - label: "Recruiting band"
            name: "joinBand"
            widget: "object"
            fields:
              - { label: "Show this section", name: "show", widget: "boolean", required: false, default: true }
              - { label: "Small label", name: "eyebrow", widget: "string" }
              - { label: "Large text", name: "title", widget: "text" }
              - { label: "Button text", name: "buttonLabel", widget: "string", required: false }
              - { label: "Button link", name: "buttonUrl", widget: "string", required: false }
              - { label: "Button icon", name: "buttonIcon", widget: "string", required: false }

      - name: "research"
        label: "Research"
        file: "content/research.json"
        format: "json"
        fields:
          - label: "Top title section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Show this top section", name: "show", widget: "boolean", required: false, default: true }
              - { label: "Small red label", name: "eyebrow", widget: "string" }
              - { label: "Large title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Background image", name: "backgroundImage", widget: "image", required: false }
              - label: "Hero image display mode"
                name: "backgroundSize"
                widget: "select"
                required: false
                default: "cover"
                options:
                  - { label: "Fill the hero area", value: "cover" }
                  - { label: "Show full image", value: "contain" }
              - label: "Hero image position"
                name: "backgroundPosition"
                widget: "select"
                required: false
                default: "center"
                options:
                  - { label: "Center", value: "center" }
                  - { label: "Top", value: "top" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Left", value: "left" }
                  - { label: "Right", value: "right" }
              - label: "Hero height"
                name: "heroHeight"
                widget: "select"
                required: false
                default: "standard"
                options:
                  - { label: "Compact", value: "compact" }
                  - { label: "Standard", value: "standard" }
                  - { label: "Tall", value: "tall" }
              - label: "Title size"
                name: "titleSize"
                widget: "select"
                default: "normal"
                options: ["compact", "normal", "large"]
              - label: "Text alignment"
                name: "textAlignment"
                widget: "select"
                default: "left"
                options: ["left", "center"]
              - label: "Buttons"
                name: "buttons"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { label: "Show this button", name: "visible", widget: "boolean", required: false, default: true }
                  - { label: "Button text", name: "label", widget: "string" }
                  - { label: "Button link", name: "url", widget: "string" }
                  - { label: "Icon name, optional", name: "icon", widget: "string", required: false }
                  - { label: "Button style", name: "style", widget: "select", default: "primary", options: ["primary", "ghost"] }
          - label: "Research direction cards"
            name: "topics"
            widget: "list"
            summary: "{{fields.number}} {{fields.titleLine1}} {{fields.titleLine2}}"
            fields:
              - { label: "Show this card", name: "visible", widget: "boolean", required: false, default: true }
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Title line 1", name: "titleLine1", widget: "string" }
              - { label: "Title line 2", name: "titleLine2", widget: "string" }
              - { label: "Description", name: "text", widget: "text" }

      - name: "publications"
        label: "Publications"
        file: "content/publications.json"
        format: "json"
        fields:
          - label: "Top title section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Show this top section", name: "show", widget: "boolean", required: false, default: true }
              - { label: "Small red label", name: "eyebrow", widget: "string" }
              - { label: "Large title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Background image", name: "backgroundImage", widget: "image", required: false }
              - label: "Hero image display mode"
                name: "backgroundSize"
                widget: "select"
                required: false
                default: "cover"
                options:
                  - { label: "Fill the hero area", value: "cover" }
                  - { label: "Show full image", value: "contain" }
              - label: "Hero image position"
                name: "backgroundPosition"
                widget: "select"
                required: false
                default: "center"
                options:
                  - { label: "Center", value: "center" }
                  - { label: "Top", value: "top" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Left", value: "left" }
                  - { label: "Right", value: "right" }
              - label: "Hero height"
                name: "heroHeight"
                widget: "select"
                required: false
                default: "standard"
                options:
                  - { label: "Compact", value: "compact" }
                  - { label: "Standard", value: "standard" }
                  - { label: "Tall", value: "tall" }
              - { label: "Title size", name: "titleSize", widget: "select", default: "normal", options: ["compact", "normal", "large"] }
              - { label: "Text alignment", name: "textAlignment", widget: "select", default: "left", options: ["left", "center"] }
              - label: "Buttons"
                name: "buttons"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { label: "Show this button", name: "visible", widget: "boolean", required: false, default: true }
                  - { label: "Button text", name: "label", widget: "string" }
                  - { label: "Button link", name: "url", widget: "string" }
                  - { label: "Icon name, optional", name: "icon", widget: "string", required: false }
                  - { label: "Button style", name: "style", widget: "select", default: "primary", options: ["primary", "ghost"] }
          - label: "Section headings"
            name: "sections"
            widget: "object"
            fields:
              - label: "Independent work section"
                name: "independent"
                widget: "object"
                fields:
                  - { label: "Show this section", name: "show", widget: "boolean", required: false, default: true }
                  - { label: "Small red label", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
              - label: "Prior work section"
                name: "prior"
                widget: "object"
                fields:
                  - { label: "Show this section", name: "show", widget: "boolean", required: false, default: true }
                  - { label: "Small red label", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
          - label: "Publication link button labels"
            name: "linkLabels"
            widget: "object"
            fields:
              - { label: "DOI button text", name: "doi", widget: "string", default: "DOI" }
              - { label: "Journal button text", name: "journal", widget: "string", default: "Journal" }
          - label: "Independent work at NWU"
            name: "independent"
            widget: "list"
            summary: "{{fields.year}} - {{fields.journal}} - {{fields.title}}"
            fields:
              - { label: "Show this paper", name: "visible", widget: "boolean", required: false, default: true }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Title", name: "title", widget: "text" }
              - { label: "Authors", name: "authors", widget: "text" }
              - { label: "Journal abbreviation", name: "journal", widget: "string" }
              - { label: "Volume / page / DOI details", name: "details", widget: "string" }
              - { label: "TOC image", name: "tocImage", widget: "image", required: false }
              - label: "TOC image width in publication row"
                name: "tocWidth"
                widget: "select"
                required: false
                default: "standard"
                options:
                  - { label: "Standard", value: "standard" }
                  - { label: "Small", value: "small" }
                  - { label: "Wide", value: "wide" }
              - label: "TOC image height"
                name: "tocHeight"
                widget: "select"
                required: false
                default: "standard"
                options:
                  - { label: "Standard", value: "standard" }
                  - { label: "Short", value: "short" }
                  - { label: "Tall", value: "tall" }
              - label: "TOC image display mode"
                name: "tocFit"
                widget: "select"
                required: false
                default: "contain"
                options:
                  - { label: "Show full image, no cropping", value: "contain" }
                  - { label: "Fill area, crop edges if needed", value: "cover" }
              - label: "TOC image position"
                name: "tocPosition"
                widget: "select"
                required: false
                default: "center"
                options:
                  - { label: "Center", value: "center" }
                  - { label: "Top", value: "top" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Left", value: "left" }
                  - { label: "Right", value: "right" }
              - label: "TOC image background"
                name: "tocBackground"
                widget: "select"
                required: false
                default: "white"
                options:
                  - { label: "White", value: "white" }
                  - { label: "Light gray", value: "light" }
                  - { label: "Transparent", value: "transparent" }
              - { label: "TOC placeholder text", name: "tocLabel", widget: "string", required: false, default: "TOC pending" }
              - { label: "TOC placeholder color", name: "tocColor", widget: "select", required: false, options: ["blue", "teal", "red", "gold"] }
              - { label: "DOI URL", name: "doiUrl", widget: "string", required: false }
              - { label: "DOI label if no DOI URL", name: "doiLabel", widget: "string", required: false }
              - { label: "Custom DOI button text", name: "doiButtonLabel", widget: "string", required: false }
              - { label: "Journal URL", name: "journalUrl", widget: "string", required: false }
              - { label: "Custom journal button text", name: "journalButtonLabel", widget: "string", required: false }
          - label: "Prior to NWU"
            name: "prior"
            widget: "list"
            summary: "{{fields.year}} - {{fields.journal}} - {{fields.title}}"
            fields:
              - { label: "Show this paper", name: "visible", widget: "boolean", required: false, default: true }
              - { label: "Title", name: "title", widget: "text" }
              - { label: "Authors", name: "authors", widget: "text" }
              - { label: "Journal abbreviation", name: "journal", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Volume / page details", name: "details", widget: "string" }

      - name: "people"
        label: "People"
        file: "content/people.json"
        format: "json"
        fields:
          - label: "Top title section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Show this top section", name: "show", widget: "boolean", required: false, default: true }
              - { label: "Small red label", name: "eyebrow", widget: "string" }
              - { label: "Large title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Background image", name: "backgroundImage", widget: "image", required: false }
              - label: "Hero image display mode"
                name: "backgroundSize"
                widget: "select"
                required: false
                default: "cover"
                options:
                  - { label: "Fill the hero area", value: "cover" }
                  - { label: "Show full image", value: "contain" }
              - label: "Hero image position"
                name: "backgroundPosition"
                widget: "select"
                required: false
                default: "center"
                options:
                  - { label: "Center", value: "center" }
                  - { label: "Top", value: "top" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Left", value: "left" }
                  - { label: "Right", value: "right" }
              - label: "Hero height"
                name: "heroHeight"
                widget: "select"
                required: false
                default: "standard"
                options:
                  - { label: "Compact", value: "compact" }
                  - { label: "Standard", value: "standard" }
                  - { label: "Tall", value: "tall" }
              - { label: "Title size", name: "titleSize", widget: "select", default: "normal", options: ["compact", "normal", "large"] }
              - { label: "Text alignment", name: "textAlignment", widget: "select", default: "left", options: ["left", "center"] }
              - label: "Buttons"
                name: "buttons"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { label: "Show this button", name: "visible", widget: "boolean", required: false, default: true }
                  - { label: "Button text", name: "label", widget: "string" }
                  - { label: "Button link", name: "url", widget: "string" }
                  - { label: "Icon name, optional", name: "icon", widget: "string", required: false }
                  - { label: "Button style", name: "style", widget: "select", default: "primary", options: ["primary", "ghost"] }
          - label: "People groups"
            name: "groups"
            widget: "list"
            summary: "{{fields.category}}"
            fields:
              - { label: "Show this group", name: "visible", widget: "boolean", required: false, default: true }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Empty category note", name: "note", widget: "text", required: false }
              - label: "Members"
                name: "members"
                widget: "list"
                required: false
                summary: "{{fields.name}} - {{fields.role}}"
                fields:
                  - { label: "Show this person", name: "visible", widget: "boolean", required: false, default: true }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Role", name: "role", widget: "string", required: false }
                  - { label: "Photo", name: "photo", widget: "image", required: false }
                  - label: "Photo display mode"
                    name: "photoFit"
                    widget: "select"
                    required: false
                    default: "cover"
                    options:
                      - { label: "Fill area, crop edges if needed", value: "cover" }
                      - { label: "Show full image, no cropping", value: "contain" }
                  - label: "Photo position"
                    name: "photoPosition"
                    widget: "select"
                    required: false
                    default: "center"
                    options:
                      - { label: "Center", value: "center" }
                      - { label: "Top", value: "top" }
                      - { label: "Bottom", value: "bottom" }
                      - { label: "Left", value: "left" }
                      - { label: "Right", value: "right" }
                  - label: "Photo size"
                    name: "photoSize"
                    widget: "select"
                    required: false
                    default: "standard"
                    options:
                      - { label: "Small", value: "small" }
                      - { label: "Standard", value: "standard" }
                      - { label: "Large", value: "large" }
                  - { label: "Featured PI card", name: "featured", widget: "boolean", required: false, default: false }
                  - label: "Tags"
                    name: "tags"
                    widget: "list"
                    required: false
                    field: { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Degree", name: "degree", widget: "string", required: false }
                  - { label: "Graduation year", name: "year", widget: "string", required: false }
                  - { label: "Destination", name: "destination", widget: "string", required: false }

      - name: "news"
        label: "News"
        file: "content/news.json"
        format: "json"
        fields:
          - label: "Top title section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Show this top section", name: "show", widget: "boolean", required: false, default: true }
              - { label: "Small red label", name: "eyebrow", widget: "string" }
              - { label: "Large title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Background image", name: "backgroundImage", widget: "image", required: false }
              - label: "Hero image display mode"
                name: "backgroundSize"
                widget: "select"
                required: false
                default: "cover"
                options:
                  - { label: "Fill the hero area", value: "cover" }
                  - { label: "Show full image", value: "contain" }
              - label: "Hero image position"
                name: "backgroundPosition"
                widget: "select"
                required: false
                default: "center"
                options:
                  - { label: "Center", value: "center" }
                  - { label: "Top", value: "top" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Left", value: "left" }
                  - { label: "Right", value: "right" }
              - label: "Hero height"
                name: "heroHeight"
                widget: "select"
                required: false
                default: "standard"
                options:
                  - { label: "Compact", value: "compact" }
                  - { label: "Standard", value: "standard" }
